  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

adius:999px\">Get in touch!<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#0E0D0B;color:rgba(241,235,223,0.7);padding:26px 48px;display:flex;justify-content:space-between;align-items:center;font-size:13px\">\n  <div style=\"display:flex;align-items:center;gap:10px\"><div data-spin=\"0.3\" style=\"width:16px;height:16px;background:#DE6B35;clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%)\"><\u002Fdiv><span style=\"font-family:'Abril Fatface',serif;color:#F1EBDF;font-size:16px\">Manvi Modi<\u002Fspan><\u002Fdiv>\n  <div>manvimodi3@gmail.com · +91 62847 16414<\u002Fdiv>\n<\u002Ffooter>\n\n<div style=\"display:none;width:0;height:0;overflow:hidden\"><x-import component-from-global-scope=\"image-slot\" from=\"31b60f16-ce57-4660-a683-fadb48da77c5#/image-slot.js\" hint-size=\"0px,0px\"><\u002Fx-import><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;motion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;revealReplay&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;spinSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.12,&quot;min&quot;:0,&quot;max&quot;:0.5,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;clickSound&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sound&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._cleanup = [];\n    this._setup();\n  }\n  componentWillUnmount() { (this._cleanup || []).forEach(fn => fn()); }\n  _motionOn() { return this.props.motion ?? true; }\n  _setup() {\n    // click sound (synthesized, no audio file needed)\n    const clickSound = () => {\n      if (!(this.props.clickSound ?? true)) return;\n      try {\n        this._ac = this._ac || new (window.AudioContext || window.webkitAudioContext)();\n        const ac = this._ac;\n        if (ac.state === 'suspended') ac.resume();\n        const o = ac.createOscillator(), g = ac.createGain();\n        o.type = 'square'; o.frequency.value = 820;\n        g.gain.setValueAtTime(0.12, ac.currentTime);\n        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.08);\n        o.frequency.exponentialRampToValueAtTime(320, ac.currentTime + 0.08);\n        o.connect(g); g.connect(ac.destination);\n        o.start(); o.stop(ac.currentTime + 0.09);\n      } catch (e) {}\n    };\n    document.addEventListener('pointerdown', clickSound);\n    this._cleanup.push(() => document.removeEventListener('pointerdown', clickSound));\n    const speed = () => this.props.spinSpeed ?? 0.12;\n    const replay = () => this.props.revealReplay ?? true;\n    // Reveal-on-scroll\n    const hidden = {\n      left: 'translateX(-60px)', right: 'translateX(60px)',\n      up: 'translateY(40px)', zoom: 'scale(0.8)'\n    };\n    const reveals = Array.from(document.querySelectorAll('[data-reveal]'));\n    reveals.forEach(el => {\n      el.style.transition = 'opacity 0.7s cubic-bezier(.22,.9,.3,1), transform 0.7s cubic-bezier(.22,.9,.3,1)';\n      if (this._motionOn()) {\n        el.style.opacity = '0';\n        el.style.transform = hidden[el.dataset.reveal] || 'translateY(30px)';\n      }\n    });\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(e => {\n        if (!this._motionOn()) { e.target.style.opacity = '1'; e.target.style.transform = 'none'; return; }\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n        } else if (replay()) {\n          e.target.style.opacity = '0';\n          e.target.style.transform = hidden[e.target.dataset.reveal] || 'translateY(30px)';\n        }\n      });\n    }, { threshold: 0.12 });\n    reveals.forEach(el => io.observe(el));\n    this._cleanup.push(() => io.disconnect());\n    // Count-up stats\n    const counts = Array.from(document.querySelectorAll('[data-countup]'));\n    counts.forEach(el => { el._target = el.textContent; });\n    const animateCount = (el) => {\n      const m = el._target.match(/^([^0-9]*)([\\d.]+)(.*)$/);\n      if (!m || el._counting) return;\n      el._counting = true;\n      const target = parseFloat(m[2]), dec = (m[2].split('.')[1] || '').length;\n      const t0 = performance.now(), dur = 900;\n      const tick = (t) => {\n        const p = Math.min((t - t0) / dur, 1);\n        const e = 1 - Math.pow(1 - p, 3);\n        el.textContent = m[1] + (target * e).toFixed(dec) + m[3];\n        if (p < 1) requestAnimationFrame(tick); else { el.textContent = el._target; el._counting = false; }\n      };\n      requestAnimationFrame(tick);\n    };\n    const cio = new IntersectionObserver(entries => {\n      entries.forEach(e => { if (e.isIntersecting && this._motionOn()) animateCount(e.target); });\n    }, { threshold: 0.6 });\n    counts.forEach(el => cio.observe(el));\n    this._cleanup.push(() => cio.disconnect());\n    // Scroll-linked: spin, parallax, tilt, zoom-toward-center\n    const spins = Array.from(document.querySelectorAll('[data-spin]'));\n    const paras = Array.from(document.querySelectorAll('[data-parallax]'));\n    const tilts = Array.from(document.querySelectorAll('[data-tilt]'));\n    const zooms = Array.from(document.querySelectorAll('[data-zoom]'));\n    let raf = 0;\n    const frame = () => {\n      raf = 0;\n      if (!this._motionOn()) return;\n      const y = window.scrollY, vh = window.innerHeight;\n      spins.forEach(el => { el.style.transform = 'rotate(' + (y * parseFloat(el.dataset.spin) * speed() * 10) + 'deg)'; });\n      paras.forEach(el => { el.style.transform = 'translateX(' + (y * parseFloat(el.dataset.parallax)) + 'px)'; });\n      tilts.forEach(el => {\n        const r = el.getBoundingClientRect();\n        const c = r.top + r.height / 2;\n        const d = (c - vh / 2) / vh; // -0.5..0.5-ish\n        el.style.transform = 'rotate(' + (d * -8 * parseFloat(el.dataset.tilt)) + 'deg)';\n      });\n      // nav scroll spy\n      const spyLinks = Array.from(document.querySelectorAll('[data-spy]'));\n      if (spyLinks.length) {\n        let active = '';\n        ['about', 'resume', 'work'].forEach(id => {\n          const s = document.getElementById(id);\n          if (s && s.getBoundingClientRect().top < vh * 0.4) active = id;\n        });\n        spyLinks.forEach(a => {\n          const on = a.dataset.spy === active;\n          a.style.color = on ? '#F0A62E' : '#F1EBDF';\n          a.style.textDecoration = on ? 'underline' : 'none';\n          a.style.textUnderlineOffset = '6px';\n        });\n      }\n      // Vectr-style pinned journey steps\n      const track = document.getElementById('journey-track');\n      if (track) {\n        const r = track.getBoundingClientRect();\n        const total = r.height - vh;\n        const p = Math.min(Math.max(-r.top / Math.max(total, 1), 0), 0.999);\n        const steps = Array.from(track.querySelectorAll('[data-step]'));\n        const idx = Math.floor(p * steps.length);\n        steps.forEach((el, i) => {\n          const on = i === idx;\n          const num = el.querySelector('.step-num'), title = el.querySelector('.step-title'), body = el.querySelector('.step-body');\n          num.style.background = on ? '#F0A62E' : 'transparent';\n          num.style.boxShadow = on ? '4px 5px 0 rgba(0,0,0,0.15)' : 'none';\n          title.style.fontSize = on ? '34px' : '20px';\n          title.style.opacity = on ? '1' : '0.55';\n          body.style.maxHeight = on ? '200px' : '0';\n          body.style.opacity = on ? '1' : '0';\n        });\n        const dial = document.getElementById('journey-dial');\n        if (dial) dial.style.transform = 'rotate(' + (p * 360) + 'deg) scale(' + (0.85 + 0.15 * Math.sin(p * Math.PI)) + ')';\n        const count = document.getElementById('journey-count');\n        if (count) count.textContent = '0' + (idx + 1);\n      }\n      zooms.forEach(el => {\n        if (el.style.opacity === '0') return; // let reveal own it while hidden\n        const r = el.getBoundingClientRect();\n        const c = r.top + r.height / 2;\n        const d = Math.min(Math.abs(c - vh / 2) / (vh / 2), 1);\n        const hov = el.matches(':hover');\n        el.style.transform = 'scale(' + ((hov ? 1.06 : 1.04) - d * 0.1).toFixed(3) + ')' + (hov ? ' translateY(-8px)' : '');\n      });\n    };\n    const onScroll = () => { if (!raf) raf = requestAnimationFrame(frame); };\n    // Lenis smooth scrolling (darkroomengineering/lenis)\n    if (window.Lenis && !this._lenis) {\n      const lenis = new window.Lenis({ duration: 1.15, smoothWheel: true });\n      this._lenis = lenis;\n      let lraf;\n      const loop = (t) => { lenis.raf(t); lraf = requestAnimationFrame(loop); };\n      lraf = requestAnimationFrame(loop);\n      lenis.on('scroll', onScroll);\n      const anchorClick = (e) => {\n        const a = e.target.closest('a[href^=\"#\"]');\n        if (!a) return;\n        const target = document.querySelector(a.getAttribute('href'));\n        if (target) { e.preventDefault(); lenis.scrollTo(target, { duration: 1.4 }); }\n      };\n      document.addEventListener('click', anchorClick);\n      this._cleanup.push(() => { cancelAnimationFrame(lraf); lenis.destroy(); document.removeEventListener('click', anchorClick); this._lenis = null; });\n    }\n    window.addEventListener('scroll', onScroll, { passive: true });\n    window.addEventListener('resize', onScroll, { passive: true });\n    zooms.forEach(el => { el.addEventListener('mouseenter', onScroll); el.addEventListener('mouseleave', onScroll); });\n    this._cleanup.push(() => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); });\n    frame();\n  }\n  renderVals() {\n    return {\n      btnHover: { background: '#DE6B35', color: '#F1EBDF' },\n      cardHover: { boxShadow: '12px 14px 0 rgba(14,13,11,0.3), 0 28px 60px rgba(14,13,11,0.35)' },\n      cardHoverDark: { boxShadow: '10px 12px 0 rgba(63,90,54,0.6)' }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
